components:
  schemas:
    Alert:
      type: object
      properties:
        url:
          type: string
          maxLength: 255
        id:
          type: integer
          readOnly: true
        createtime:
          type: string
          format: date-time
          readOnly: true
          title: Create time
        lastupdate:
          type: string
          format: date-time
          readOnly: true
          title: Last update
        closetime:
          type: string
          format: date-time
          nullable: true
          title: Close time
        duplicate_count:
          type: integer
          readOnly: true
        resource:
          type: string
          maxLength: 255
        environment:
          type: string
          maxLength: 255
        correlate:
          type: string
          maxLength: 255
        event:
          type: string
          maxLength: 255
        service:
          type: string
          maxLength: 1024
        value:
          type: string
          maxLength: 255
        status:
          oneOf:
          - $ref: '#/components/schemas/AlertStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
        timeout:
          type: integer
          readOnly: true
        text:
          type: string
        type:
          type: string
          maxLength: 255
        alert_template:
          type: integer
          readOnly: true
          nullable: true
        origin:
          type: string
          maxLength: 255
        tags:
          type: string
          maxLength: 255
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - alert_template
      - createtime
      - duplicate_count
      - event
      - id
      - lastupdate
      - resource
      - timeout
    AlertStatusEnum:
      enum:
      - open
      - closed
      type: string
      description: |-
        * `open` - Open
        * `closed` - Closed
    AlertTemplates:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was created
        updated_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was last updated
        name:
          type: string
          maxLength: 4096
        alert_name:
          type: string
          description: Name of event to match template on.
          maxLength: 255
        notify_on_open:
          type: boolean
          description: If enabled a audio and visual notification is send to the users,
            else a silent notification is send.
        notify_on_close:
          type: boolean
          description: If enabled a audio and visual notification is send to the users,
            else a silent notification is send.
        notify_itsm:
          type: boolean
          description: Forward the alert to the ITSM as a new incident.
        itsm_group:
          type: string
          description: Specify the group that is used in creating the new incident.
          maxLength: 255
        match_value:
          type: string
          description: Regex to match on the value field.
          maxLength: 4096
        match_service:
          type: string
          description: Regex to match on the service field.
          maxLength: 4096
        match_environment:
          type: string
          description: Regex to match on the environment field.
          maxLength: 4096
        match_severity:
          type: string
          description: Regex to match on the severity field.
          maxLength: 4096
        match_resource:
          type: string
          description: Regex to match on the resource field.
          maxLength: 4096
        override_severity:
          oneOf:
          - $ref: '#/components/schemas/OverrideSeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
        created_by_user:
          type: integer
          readOnly: true
          nullable: true
          description: User who created this object
        updated_by_user:
          type: integer
          readOnly: true
          nullable: true
          description: User who last updated this object
        telegram_template:
          type: integer
          nullable: true
        notification_schema:
          type: array
          items:
            type: integer
          description: The notification schema determines which users receive a notification.
      required:
      - created_at_timestamp
      - created_by_user
      - id
      - updated_at_timestamp
      - updated_by_user
    Attribute:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_by_user:
          allOf:
          - $ref: '#/components/schemas/UserSlim'
          readOnly: true
        updated_by_user:
          allOf:
          - $ref: '#/components/schemas/UserSlim'
          readOnly: true
        created_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was created
        updated_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was last updated
        name:
          type: string
          description: Name of the attribute.
          maxLength: 255
        value:
          type: string
          description: Value of the attribute, can be anything.
          maxLength: 2048
      required:
      - created_at_timestamp
      - created_by_user
      - id
      - name
      - updated_at_timestamp
      - updated_by_user
      - value
    BindpointEnum:
      enum:
      - REQUEST
      - RESPONSE
      type: string
      description: |-
        * `REQUEST` - REQUEST
        * `RESPONSE` - RESPONSE
    BlankEnum:
      enum:
      - ''
    Certificater:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          default: ''
          maxLength: 255
        ca:
          type: boolean
        valid_to_timestamp:
          type: string
          format: date-time
          nullable: true
        loadbalancer:
          type: string
          nullable: true
      required:
      - id
    Contact:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: string
          maxLength: 255
        firstname:
          type: string
          maxLength: 255
        lastname:
          type: string
          maxLength: 255
        email:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 255
        address:
          type: string
          maxLength: 255
      required:
      - company
      - id
    Contacts:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was created
        updated_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was last updated
        telegram_enabled:
          type: boolean
        telegram_id:
          type: string
          maxLength: 255
        email_enabled:
          type: boolean
        email_address:
          type: string
          maxLength: 255
        itsm_enabled:
          type: boolean
        itsm_address:
          type: string
          maxLength: 255
        itsm_owner_grp:
          type: string
          maxLength: 255
        itsm_ci:
          type: string
          maxLength: 255
        itsm_urgency:
          type: string
          maxLength: 255
        pushover_enabled:
          type: boolean
        pushover_userkey:
          type: string
          maxLength: 255
        pushnotification_enabled:
          type: boolean
          description: Enable pushnotification to MCS next devices.
        created_by_user:
          type: integer
          readOnly: true
          nullable: true
          description: User who created this object
        updated_by_user:
          type: integer
          readOnly: true
          nullable: true
          description: User who last updated this object
        contact:
          type: integer
      required:
      - contact
      - created_at_timestamp
      - created_by_user
      - id
      - updated_at_timestamp
      - updated_by_user
    ContentType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        app_label:
          type: string
