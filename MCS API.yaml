components:
  schemas:
    Alert:
      type: object
      properties:
        url:
          type: string
          maxLength: 255
        id:
          type: integer
          readOnly: true
        createtime:
          type: string
          format: date-time
          readOnly: true
          title: Create time
        lastupdate:
          type: string
          format: date-time
          readOnly: true
          title: Last update
        duplicate_count:
          type: integer
          readOnly: true
        resource:
          type: string
          maxLength: 255
        environment:
          type: string
          maxLength: 255
        correlate:
          type: string
          maxLength: 255
        event:
          type: string
          maxLength: 255
        service:
          type: string
          maxLength: 1024
        value:
          type: string
          maxLength: 255
        status:
          oneOf:
          - $ref: '#/components/schemas/AlertStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
        timeout:
          type: integer
          readOnly: true
        text:
          type: string
        type:
          type: string
          maxLength: 255
        origin:
          type: string
          maxLength: 255
        tags:
          type: string
          maxLength: 255
        severity:
          oneOf:
          - $ref: '#/components/schemas/SeverityEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - createtime
      - duplicate_count
      - event
      - id
      - lastupdate
      - resource
      - timeout
    AlertStatusEnum:
      enum:
      - open
      - closed
      type: string
      description: |-
        * `open` - Open
        * `closed` - Closed
    BlankEnum:
      enum:
      - ''
    Certificater:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          default: ''
          maxLength: 255
        ca:
          type: boolean
        valid_to_timestamp:
          type: string
          format: date-time
          nullable: true
        loadbalancer:
          type: string
          nullable: true
      required:
      - id
    Contact:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        created_by_user:
          allOf:
          - $ref: '#/components/schemas/UserSlim'
          readOnly: true
        updated_by_user:
          allOf:
          - $ref: '#/components/schemas/UserSlim'
          readOnly: true
        created_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was created
        updated_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was last updated
        company:
          type: string
          maxLength: 255
        firstname:
          type: string
          maxLength: 255
        lastname:
          type: string
          maxLength: 255
        email:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 255
        address:
          type: string
          maxLength: 255
        tenant:
          type: integer
      required:
      - company
      - created_at_timestamp
      - created_by_user
      - id
      - tenant
      - updated_at_timestamp
      - updated_by_user
    CsAction:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        lbvserver:
          type: string
          format: uuid
          nullable: true
          description: Choose the loadbalancer.
        customer:
          type: string
          nullable: true
        loadbalancer:
          type: string
          nullable: true
      required:
      - id
      - name
    CsPolicy:
      type: object
      description: Adds nested create feature
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        action:
          type: string
          format: uuid
          nullable: true
        expression:
          type: string
          maxLength: 16384
        customer:
          type: string
          nullable: true
        application:
          type: string
          format: uuid
          nullable: true
        loadbalancer:
          type: string
          nullable: true
      required:
      - id
      - name
    CsvServer:
      type: object
      description: Adds nested create feature
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        ufname:
          type: string
          maxLength: 255
        ipv46:
          $ref: '#/components/schemas/Ipv46Enum'
        port:
          type: integer
        type:
          $ref: '#/components/schemas/CsvServerTypeEnum'
        policies:
          type: array
          items:
            type: string
            format: uuid
        customer:
          type: string
          nullable: true
        certificate:
          type: array
          items:
            type: string
            format: uuid
        loadbalancer:
          type: string
          nullable: true
      required:
      - id
      - name
      - type
      - ufname
    CsvServerTypeEnum:
      enum:
      - http
      - ssl
      type: string
      description: |-
        * `http` - HTTP
        * `ssl` - SSL
    Customer:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        created_by_user:
          allOf:
          - $ref: '#/components/schemas/UserSlim'
          readOnly: true
        updated_by_user:
          allOf:
          - $ref: '#/components/schemas/UserSlim'
          readOnly: true
        created_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was created
        updated_at_timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Time when this object was last updated
        name:
          type: string
          description: Customer name.
          maxLength: 255
        contractid:
          type: string
          description: For future use.
          maxLength: 255
        tenant:
          type: integer
        sdm:
          type: integer
          nullable: true
          description: Service Delivery Manager for the customer, can be used for
            compliance notifications.
        tech_contacts:
          type: array
          items:
            type: integer
          description: Technical contact of the customer, used for troubleshooting.
        admin_contacts:
          type: array
          items:
            type: integer
          description: Administrative contact of the customer, used for billing and
            maintenance notifications.
      required:
      - created_at_timestamp
      - created_by_user
      - id
      - name
      - tenant
      - updated_at_timestamp
      - updated_by_user
    CustomerSerializerMinimal:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        contractid:
          type: string
          description: For future use.
          maxLength: 255
        name:
          type: string
          description: Customer name.
          maxLength: 255
      required:
      - id
      - name
    Dbl:
      type: object
      description: Adds nested create feature
      properties:
        id:
          type: integer
          readOnly: true
        ipaddress:
          type: string
          description: 'Set the IP-address that you want to add to the DBL. Please
            be aware! This IP-address will be blocked from access to the Pink Private
            Cloud immediately. '
          maxLength: 255
        timestamp:
          type: string
          format: date-time
          readOnly: true
        source:
          type: string
          maxLength: 255
        occurrence:
          type: integer
          readOnly: true
        persistent:
          type: boolean
          description: 'If you don’t want to have the IP-address being removed after
            default time, you set the IP-address to be persistent. Please be aware!
            In this case, you’ll have to remove the IP-address from the DBL manually. '
        hostname:
          type: string
          readOnly: true
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        raw:
          nullable: true
          default: {}
      required:
      - hostname
      - id
      - occurrence
      - timestamp
    Disk:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        size:
          type: integer
          maximum: 512
          minimum: 0
          description: Size in GB
        path:
          type: string
          readOnly: true
