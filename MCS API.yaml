openapi: 3.0.3
info:
  title: MCS API
  version: 1.0.0
  description: Mijn Cloud Solutions
paths:
  /api/alerts/alert/:
    get:
      operationId: alerts_alert_list
      description: |-
        API endpoint that allows Virtualmachines to be viewed or edited.

        Valid choises for severity in descending order:
        - security
        - high
        - major
        - warning
        - minor
        - informational
      parameters:
      - in: query
        name: event__icontains
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: resource__icontains
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
        description: Search
      - in: query
        name: service__icontains
        schema:
          type: string
      - in: query
        name: severity
        schema:
          type: string
          enum:
          - ''
          - critical
          - fatal
          - informational
          - major
          - minor
          - warning
        description: |-
          * `` - -- Disabled --
          * `minor` - Minor
          * `warning` - Warning
          * `major` - Major
          * `informational` - Informational
          * `fatal` - Fatal
          * `critical` - Critical
      - in: query
        name: status
        schema:
          type: string
          enum:
          - closed
          - open
        description: |-
          * `open` - Open
          * `closed` - Closed
      - in: query
        name: value__icontains
        schema:
          type: string
      tags:
      - alerts
      security:
      - cookieAuth: []
      - basicAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlertList'
          description: ''
    post:
      operationId: alerts_alert_create
      description: |-
        API endpoint that allows Virtualmachines to be viewed or edited.

        Valid choises for severity in descending order:
        - security
        - high
        - major
        - warning
        - minor
        - informational
      tags:
      - alerts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alert'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Alert'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Alert'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
          description: ''
