  /api/alerts/alert/:
    get:
      operationId: alerts_alert_list
      description: |-
        API endpoint that allows Virtualmachines to be viewed or edited.

        Valid choises for severity in descending order:
        - security
        - high
        - major
        - warning
        - minor
        - informational
      parameters:
      - in: query
        name: event__icontains
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
