      - in: query
        name: resource__icontains
        schema:
          type: string
      - in: query
        name: search
        schema:
          type: string
        description: Search
      - in: query
        name: service__icontains
        schema:
          type: string
      - in: query
        name: severity
        schema:
          type: string
          enum:
          - ''
          - critical
          - fatal
          - informational
          - major
          - minor
          - warning
        description: |-
          * `` - -- Disabled --
          * `minor` - Minor
          * `warning` - Warning
          * `major` - Major
          * `informational` - Informational
          * `fatal` - Fatal
          * `critical` - Critical
      - in: query
        name: status
        schema:
          type: string
          enum:
          - closed
          - open
        description: |-
          * `open` - Open
          * `closed` - Closed
      - in: query
        name: value__icontains
        schema:
          type: string
      tags:
      - alerts
      security:
      - cookieAuth: []
      - basicAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAlertList'
          description: ''
    post:
      operationId: alerts_alert_create
      description: |-
